spring.application.name=FutbolLiga

spring.datasource.url=jdbc:mysql://localhost:3306/db_football_league?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:YOUR_MYSQL_PASSWORD_HERE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

application.security.jwt.secret-key=${JWT_SECRET_KEY:YOUR_SECRET_KEY_HERE}
application.security.jwt.expiration=86400000 
application.security.jwt.refresh-token.expiration=604800000